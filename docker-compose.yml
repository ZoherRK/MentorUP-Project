services:

  app:
    build: .
    container_name: grup4-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: grup4-nginx
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grup4.rule=Host(`grup4.fpnuria.net`)"
      - "traefik.http.services.grup4.loadbalancer.server.port=80"
    networks:
      - internal
      - proxy

  db:
    image: mysql:8
    container_name: grup4-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: mentorup
      MYSQL_USER: mentorup
      MYSQL_PASSWORD: mentorup123
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
  proxy:
    external: true
